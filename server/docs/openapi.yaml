openapi: 3.0.3
info:
  title: Tokana Backend API (MVP)
  version: 1.0.0
  description: |
    Complete OpenAPI spec for Tokana MVP.
servers:
  - url: http://localhost:5000
    description: Local dev
tags:
  - name: Auth
  - name: Me
  - name: Zones
  - name: Admin Zones
  - name: Orders
  - name: Pricing
  - name: Slots
  - name: Delivery OTP
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        msg:
          type: string
    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, nullable: true }
        phone:
          type: string
          nullable: true
          description: "Stored normalized E.164 format for Madagascar: +261(3x|20)xxxxxxx"
        phoneVerifiedAt:
          type: string
          format: date-time
          nullable: true
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        name: { type: string, nullable: true }
        role: { type: string, enum: [client, livreur, admin] }
    ZonePublicResponse:
      type: object
      additionalProperties:
        type: object
        properties:
          label: { type: string }
          axes:
            type: object
            additionalProperties:
              type: array
              items: { type: string }
    Zone:
      type: object
      properties:
        id: { type: integer }
        key: { type: string, enum: [ville, peripherie, super-peripherie] }
        label: { type: string }
    Axis:
      type: object
      properties:
        id: { type: integer }
        zoneId: { type: integer }
        key: { type: string, enum: [nord, est, sud, ouest, nord_ouest, sud_ouest] }
        label: { type: string }
    Locality:
      type: object
      properties:
        id: { type: integer }
        axisId: { type: integer }
        name: { type: string }
    PricingQuoteRequest:
      type: object
      properties:
        zoneLevel: { type: string, enum: [ville, peripherie, super-peripherie], description: "Optional if lat/lng provided" }
        lat: { type: number, description: "Dropoff latitude (preferred)" }
        lng: { type: number, description: "Dropoff longitude (preferred)" }
        type: { type: string, enum: [standard, express] }
        weight: { type: number }
        parcels: { type: integer }
      required: [type, weight, parcels]
    PricingQuoteResponse:
      type: object
      properties:
        zoneLevel: { type: string, enum: [ville, peripherie, super-peripherie] }
        inferredZone: { type: string, enum: [ville, peripherie, super-peripherie], nullable: true, description: "Zone inferred from lat/lng when provided" }
        type: { type: string, enum: [standard, express] }
        weight: { type: number }
        parcels: { type: integer }
        fees:
          type: object
          properties:
            pickupFee: { type: integer, example: 0 }
            deliveryFee: { type: integer, example: 5000 }
            expressSurcharge: { type: integer, example: 1500 }
        priceTotal: { type: integer, example: 6500 }
        requiresManualHandling: { type: boolean, example: false }
        instructions: { type: string, nullable: true }
        contactPhone: { type: string, nullable: true, description: 'E.164 or local format' }
    Slot:
      type: object
      properties:
        startISO: { type: string, format: date-time }
        endISO: { type: string, format: date-time }
    Order:
      type: object
      properties:
        id: { type: integer }
        type: { type: string, enum: [standard, express] }
        zoneLevel: { type: string, enum: [ville, peripherie, super-peripherie] }
        pickupAddress: { type: string }
        dropoffAddress: { type: string }
        dropoffLat: { type: number, nullable: true }
        dropoffLng: { type: number, nullable: true }
        weight: { type: number }
        parcels: { type: integer }
        cashToCollect: { type: integer, nullable: true }
        recipientPhone: { type: string, nullable: true, description: "Madagascar: +261XXXXXXXXX or 0XXXXXXXXX (3x mobile, 20 landline)" }
        recipientEmail: { type: string, nullable: true }
        status: { type: string }
        assignedTo: { type: integer, nullable: true }
        createdBy: { type: integer }
        otpVerified: { type: boolean, description: "Whether the delivery OTP has been verified for this order" }
    OrderStatusHistory:
      type: object
      properties:
        id: { type: integer }
        orderId: { type: integer }
        fromStatus: { type: string, nullable: true }
        toStatus: { type: string }
        changedAt: { type: string, format: date-time }
    OTPRequest:
      type: object
      properties:
        channel: { type: string, enum: [sms, email] }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
      required: [channel]
    OTPVerify:
      type: object
      properties:
        code: { type: string, pattern: '^[0-9]{6}$' }
      required: [code]
    LoginRequest:
      oneOf:
        - type: object
          properties:
            email: { type: string }
            password: { type: string }
          required: [email, password]
        - type: object
          properties:
            phone: { type: string }
            password: { type: string }
          required: [phone, password]
    AuthTokens:
      type: object
      properties:
        token: { type: string }
        refreshToken: { type: string }
paths:
  # Public Zones
  /api/zones:
    get:
      summary: Get public zones (DB-only)
      tags: [Zones]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZonePublicResponse'
              examples:
                sample:
                  value:
                    ville:
                      label: "Ville"
                      axes:
                        nord: ["Ankadifotsy", "Ankorondrano"]
                        sud: ["Anosy"]

  # Auth
  /api/auth/register:
    post:
      summary: Register with email or phone
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                phone:
                  type: string
                  description: "Accepts local 0(3x|20)xxxxxxx or +261..., stored as +261..."
                password: { type: string }
                name: { type: string, nullable: true }
              anyOf:
                - required: [email, password]
                - required: [phone, password]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
                  token: { type: string }
                  refreshToken: { type: string }
                  otp:
                    type: object
                    nullable: true
                    description: "Present when an OTP has been auto-sent after registration"
                    properties:
                      channel: { type: string, enum: [sms, email] }
                      to: { type: string, nullable: true, description: "Masked destination" }
              examples:
                sample:
                  value:
                    user:
                      id: 12
                      email: "client@example.com"
                      phone: "+261341234567"
                      name: "Client Test"
                      role: "client"
                    token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    refreshToken: "1|df4a9b7e..."
                    otp:
                      channel: "sms"
                      to: "+26134******67"
        '409':
          description: Conflict (email or phone already registered)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                conflict:
                  value:
                    msg: "Email or phone already in use"

  /api/auth/login:
    post:
      summary: Login with email or phone
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
                  token: { type: string }
                  refreshToken: { type: string }
        '401':
          description: Unauthorized (invalid credentials)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                invalid:
                  value:
                    msg: "Invalid email/phone or password"

  /api/auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
              required: [refreshToken]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
              examples:
                sample:
                  value:
                    token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    refreshToken: "2|a1b2c3d4..."
        '401':
          description: Unauthorized (invalid/expired refresh token)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                invalid:
                  value:
                    msg: "Invalid or expired refresh token"

  /api/auth/logout:
    post:
      summary: Logout (revoke one refresh token)
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
              required: [refreshToken]
      responses:
        '200':
          description: OK
          content:
            application/json:
              examples:
                sample:
                  value:
                    msg: "Logged out"
        '401':
          description: Unauthorized (invalid refresh token)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                invalid:
                  value:
                    msg: "Invalid refresh token"

  /api/auth/logout-all:
    post:
      summary: Logout all sessions
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              examples:
                sample:
                  value:
                    msg: "Logged out from all sessions"
        '401':
          description: Unauthorized (missing/invalid token)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                noToken:
                  value:
                    msg: "Unauthorized"

  /api/auth/request-otp:
    post:
      summary: Request account OTP (phone/email verification)
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg: { type: string }
                  to: { type: string, nullable: true }
                  channel: { type: string, enum: [sms, email] }
        '400':
          description: Bad Request (missing destination or invalid phone/email)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Unauthorized (missing/invalid token)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Too Many Requests (cooldown window in effect)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
          headers:
            Retry-After:
              description: Seconds until a new request is allowed
              schema: { type: string }

  /api/auth/verify-otp:
    post:
      summary: Verify account OTP (mark phone/email as verified)
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPVerify'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg: { type: string }
                  phoneVerifiedAt: { type: string, format: date-time, nullable: true }
                  emailVerifiedAt: { type: string, format: date-time, nullable: true }
        '400':
          description: Bad Request (invalid or expired OTP / none active)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Unauthorized (missing/invalid token)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Too Many Requests (temporary lockout due to failed attempts)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
          headers:
            Retry-After:
              description: Seconds until verification is allowed again
              schema: { type: string }

  # Me
  /api/me:
    get:
      summary: Get current user
      tags: [Me]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
              examples:
                sample:
                  value:
                    id: 12
                    email: "client@example.com"
                    phone: "+261341234567"
                    name: "Client Test"
                    role: "client"
        '401':
          description: Unauthorized (missing/invalid token)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                noToken:
                  value:
                    msg: "Unauthorized"

  # Admin Zones CRUD
  /api/admin/zones:
    get:
      summary: List zones
      tags: [Admin Zones]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Zone' }
              examples:
                sample:
                  value:
                    - id: 1
                      key: "ville"
                      label: "Ville"
                    - id: 2
                      key: "peripherie"
                      label: "Périphérie"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                unauthorized:
                  value:
                    msg: "Unauthorized"
        '403':
          description: Forbidden (admin only)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                forbidden:
                  value:
                    msg: "Forbidden"
    post:
      summary: Create zone
      tags: [Admin Zones]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key: { type: string, enum: [ville, peripherie, super-peripherie] }
                label: { type: string }
              required: [key, label]
      responses:
        '201':
          description: Created
          content:
            application/json:
              examples:
                sample:
                  value:
                    id: 3
                    key: "super-peripherie"
                    label: "Super-Périphérie"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                unauthorized:
                  value:
                    msg: "Unauthorized"
        '403':
          description: Forbidden (admin only)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                forbidden:
                  value:
                    msg: "Forbidden"
        '409':
          description: Conflict (zone key already exists)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                conflict:
                  value:
                    msg: "Zone with this key already exists"

  /api/admin/zones/{id}:
    put:
      summary: Update zone label
      tags: [Admin Zones]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string }
              required: [label]
      responses:
        '200':
          description: OK
          content:
            application/json:
              examples:
                sample:
                  value:
                    id: 2
                    key: "peripherie"
                    label: "Périphérie (modifié)"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                unauthorized:
                  value:
                    msg: "Unauthorized"
        '403':
          description: Forbidden (admin only)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                forbidden:
                  value:
                    msg: "Forbidden"
        '404':
          description: Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                notFound:
                  value:
                    msg: "Zone not found"
    delete:
      summary: Delete zone
      tags: [Admin Zones]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                unauthorized:
                  value:
                    msg: "Unauthorized"
        '403':
          description: Forbidden (admin only)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                forbidden:
                  value:
                    msg: "Forbidden"
        '404':
          description: Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                notFound:
                  value:
                    msg: "Zone not found"

  /api/admin/zones/{zoneId}/axes:
    get:
      summary: List axes for zone
      tags: [Admin Zones]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: zoneId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Axis' }
              examples:
                sample:
                  value:
                    - id: 10
                      zoneId: 1
                      key: "nord"
                      label: "Nord"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                unauthorized:
                  value:
                    msg: "Unauthorized"
        '403':
          description: Forbidden (admin only)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                forbidden:
                  value:
                    msg: "Forbidden"
        '404':
          description: Zone Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                notFound:
                  value:
                    msg: "Zone not found"
    post:
      summary: Create axis for zone
      tags: [Admin Zones]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: zoneId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key: { type: string, enum: [nord, est, sud, ouest, nord_ouest, sud_ouest] }
                label: { type: string }
              required: [key, label]
      responses:
        '201':
          description: Created
          content:
            application/json:
              examples:
                sample:
                  value:
                    id: 11
                    zoneId: 1
                    key: "sud_ouest"
                    label: "Sud-Ouest"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                unauthorized:
                  value:
                    msg: "Unauthorized"
        '403':
          description: Forbidden (admin only)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                forbidden:
                  value:
                    msg: "Forbidden"
        '404':
          description: Zone Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                notFound:
                  value:
                    msg: "Zone not found"
        '409':
          description: Conflict (axis key already exists for zone)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                conflict:
                  value:
                    msg: "Axis with this key already exists for zone"

  /api/admin/zones/axes/{id}:
    put:
      summary: Update axis label
      tags: [Admin Zones]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string }
              required: [label]
      responses:
        '200':
          description: OK
          content:
            application/json:
              examples:
                sample:
                  value:
                    id: 11
                    zoneId: 1
                    key: "sud_ouest"
                    label: "Sud-Ouest (modifié)"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                unauthorized:
                  value:
                    msg: "Unauthorized"
        '403':
          description: Forbidden (admin only)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                forbidden:
                  value:
                    msg: "Forbidden"
        '404':
          description: Axis Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                notFound:
                  value:
                    msg: "Axis not found"
    delete:
      summary: Delete axis
      tags: [Admin Zones]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                unauthorized:
                  value:
                    msg: "Unauthorized"
        '403':
          description: Forbidden (admin only)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                forbidden:
                  value:
                    msg: "Forbidden"
        '404':
          description: Axis Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                notFound:
                  value:
                    msg: "Axis not found"

  /api/admin/zones/axes/{axisId}/localities:
    get:
      summary: List localities for axis
      tags: [Admin Zones]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: axisId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Locality' }
              examples:
                sample:
                  value:
                    - id: 100
                      axisId: 10
                      name: "Andavamamba"
                    - id: 101
                      axisId: 10
                      name: "67ha"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                unauthorized:
                  value:
                    msg: "Unauthorized"
        '403':
          description: Forbidden (admin only)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                forbidden:
                  value:
                    msg: "Forbidden"
        '404':
          description: Axis Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                notFound:
                  value:
                    msg: "Axis not found"
    post:
      summary: Create locality for axis
      tags: [Admin Zones]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: axisId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
